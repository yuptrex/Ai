<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fun With Ai — Chat + Web (3-4s Delay)</title>
<style>
/* ============================
   Core styling and layout
   ============================ */
:root{
  --bg: #eef6fb;
  --panel: #ffffff;
  --ai-red: #ff5b5b;
  --you-blue: #2b8fd6;
  --muted: #7d8ca3;
  --bubble-shadow: 0 10px 30px rgba(10,20,40,0.06);
  --max-width: 720px;
}

html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);-webkit-font-smoothing:antialiased}
.container{max-width:var(--max-width);margin:26px auto;height:86vh;display:flex;flex-direction:column;background:var(--panel);border-radius:12px;box-shadow:0 20px 50px rgba(20,30,60,0.08);overflow:hidden}
.header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.04)}
.header .aiLogo{width:46px;height:40px;border-radius:10px;background:linear-gradient(180deg,#ff8a8a,var(--ai-red));display:flex;align-items:center;justify-content:center;color:white;font-weight:800;box-shadow:0 6px 18px rgba(255,90,90,0.14)}
.header .title{font-size:18px;font-weight:700}
.header .subtitle{font-size:12px;color:var(--muted);margin-top:2px}

/* messages area */
.chatArea{display:flex;flex-direction:column;flex:1;min-height:0}
.messages{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.01));box-sizing:border-box}
.row{display:flex;gap:12px;align-items:flex-end}
.row.ai{justify-content:flex-start}
.row.you{justify-content:flex-end}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;flex:0 0 44px;box-shadow:0 8px 18px rgba(12,20,30,0.08)}
.avatar.ai{background:var(--ai-red)}
.avatar.you{background:var(--you-blue)}
.bubble{max-width:72%;padding:12px 14px;border-radius:14px;box-shadow:var(--bubble-shadow);line-height:1.35;position:relative;animation:fadeUp .16s ease;white-space:pre-wrap}
.bubble.ai{background:linear-gradient(180deg,#fff,#fbfcff);border-top-left-radius:6px;color:#0b1a29}
.bubble.you{background:linear-gradient(180deg,#dff4ff,#cfefff);border-top-right-radius:6px;color:#042033}
.meta{font-size:11px;color:var(--muted);margin-top:8px}
.typing{display:inline-flex;gap:8px;padding:8px 12px;border-radius:14px;background:#fff;box-shadow:var(--bubble-shadow)}
.dot{width:8px;height:8px;border-radius:50%;background:#cfd8e6;opacity:0.85;animation:typing 1s infinite}
.dot:nth-child(2){animation-delay:0.12s}
.dot:nth-child(3){animation-delay:0.24s}
@keyframes typing{0%{opacity:0.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}100%{opacity:0.25;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* composer */
.composer{padding:12px;border-top:1px solid rgba(0,0,0,0.04);display:flex;gap:10px;align-items:center;background:linear-gradient(180deg,rgba(255,255,255,0.6),rgba(255,255,255,0.4))}
.inputWrap{flex:1;display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,#fff,#fbfdff);border-radius:28px;padding:8px 12px;box-shadow:0 10px 30px rgba(10,20,40,0.03)}
textarea#input{flex:1;border:0;outline:none;resize:none;background:transparent;font-size:15px;padding:8px;height:44px}
button.send{width:52px;height:52px;border-radius:50%;border:0;background:linear-gradient(180deg,#9fd7ff,#66c2ff);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(40,120,200,0.16);cursor:pointer}
.hint{padding:8px 12px;font-size:13px;color:var(--muted);border-top:1px dotted rgba(0,0,0,0.03);text-align:center}
.small{font-size:13px;color:var(--muted)}
@media (max-width:640px){:root{--max-width:96vw}.avatar{width:40px;height:40px}.bubble{padding:10px 12px}}

</style>
</head>

<body>
  <div class="container" role="application" aria-label="Fun With Ai Chat">
    <div class="header">
      <div class="aiLogo" aria-hidden="true">AI</div>
      <div>
        <div class="title">Fun With Ai</div>
        <div class="subtitle small">Red = AI (left) — Blue = You (right). AI types, thinks and replies.</div>
      </div>
    </div>

    <main class="chatArea">
      <div id="messages" class="messages" role="list" aria-live="polite"></div>

      <div class="composer" role="region" aria-label="Composer">
        <div class="inputWrap">
          <textarea id="input" placeholder="Type a message... (Shift+Enter for newline)" rows="1"></textarea>
        </div>
        <button id="sendBtn" class="send" title="Send" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#042033" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"></path>
            <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
          </svg>
        </button>
      </div>

      <div class="hint">Auto web search enabled for factual queries. The AI will "think" for 3–4 seconds before answering.</div>
    </main>
  </div>

<script>
// full script omitted in this context because it's long; in actual usage, you'd embed it here.

</script>
</body>
</html>
